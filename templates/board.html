{% extends "base.html" %}
{% block content %}
<div class="row">
    <div class="col-md-5">
        <div class="glass-card">
            <h4 class="fw-bold mb-3">發佈新留言</h4>
            <div class="mb-3">
                <label class="small fw-bold mb-2">想說些什麼？</label>
                <textarea id="msg" class="form-control border-0 shadow-sm" rows="5" 
                          style="border-radius: 15px;" placeholder="在此輸入內容..."></textarea>
            </div>
            <button onclick="sendMessage()" class="btn-main w-100">送出留言</button>
        </div>
    </div>

    <div class="col-md-7">
        <div class="glass-card">
            <h4 class="fw-bold mb-4">即時留言列表</h4>
            <div id="chat-box">
                </div>
        </div>
    </div>
</div>

<style>
    .message-bubble {
        background: white;
        border-radius: 18px;
        padding: 15px 20px;
        margin-bottom: 15px;
        border: 1px solid #f0f0f0;
        transition: 0.2s;
    }
    .message-bubble:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    .user-tag { color: var(--accent-orange); font-weight: bold; font-size: 0.85rem; }
    .like-badge { background: #fefae0; color: #bc6c25; padding: 2px 10px; border-radius: 10px; font-size: 0.8rem; }
</style>

<script>
    async function loadMessages() {
        const res = await fetch('/api/messages');
        const data = await res.json();
        const box = document.getElementById('chat-box');
        box.innerHTML = '';
        for (let id in data) {
            box.innerHTML += `
                <div class="message-bubble shadow-sm">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="user-tag">@${data[id].user}</span>
                        <span class="like-badge">讚 0</span>
                    </div>
                    <p class="mb-0 text-dark">${data[id].text}</p>
                </div>
            `;
        }
    }
    setInterval(loadMessages, 5000);
    loadMessages();

    async function sendMessage() {
        const text = document.getElementById('msg').value;
        if(!text) return;
        await fetch('/api/messages', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({text: text})
        });
        document.getElementById('msg').value = '';
        loadMessages();
    }
</script>
{% endblock %}
