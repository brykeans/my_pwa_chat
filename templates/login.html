{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="glass-card text-start shadow-lg">
            <h3 class="fw-bold mb-3 text-dark">Screen1：登入</h3>
            <p class="text-muted mb-4">輸入帳號密碼後進入留言板，流程對應 PDF 的 Screen1。</p>
            
            <form action="/login_action" method="POST">
                <div class="mb-3">
                    <label class="fw-bold mb-2" style="color: var(--secondary-text);">帳號</label>
                    <input type="text" name="username" class="form-control shadow-sm" 
                           placeholder="請輸入您的帳號" required>
                </div>
                <div class="mb-4">
                    <label class="fw-bold mb-2" style="color: var(--secondary-text);">密碼</label>
                    <input type="password" name="password" class="form-control shadow-sm" 
                           placeholder="請輸入您的密碼" required>
                </div>
                
                <div class="d-grid gap-2">
                    <button type="submit" class="btn-main py-2 fw-bold">登入系統</button>
                    <a href="/register" class="btn btn-outline-secondary border-0 small text-center">
                        還沒有帳號？前往註冊
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    /* 針對輸入框的額外美化 */
    .form-control:focus {
        border-color: var(--accent-green);
        box-shadow: 0 0 0 0.25rem rgba(45, 106, 79, 0.1);
    }
    .btn-main {
        background-color: var(--accent-green);
        /* --- 關鍵修改：將文字顏色改為黑色 --- */
        color: black !important; 
        border: none;
        border-radius: 15px;
        transition: 0.3s;
    }
    .btn-main:hover {
        background-color: #1b4332;
        transform: translateY(-2px);
        /* 確保懸停時文字依然是黑色 */
        color: black !important;
    }
</style>
{% endblock %}
